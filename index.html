 <!DOCTYPE html>
<html lang="fr">

                <p class="temps">Couvert</p>

        </div>
        <div class="hour-prevision-block">
            <div class="h-block">

                <p class="value-hour-prevision"></p>
            </div>
            <div class="h-block">
                <p class="prevision-name-hour"></p>
                <p class="value-hour-prevision"></p>
            </div>
        </div>
        <div class="daily-prevision-block">
            <div class="day-block">
                <p class="day-prevision-name"></p>
                <p class="temperature-prevision-day"></p>
            </div>
            <div class="day-block">
                <p class="day-prevision-name"></p>
